name: FoodJournal
options:
  bundleIdPrefix: com.waynefolkes
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top

# supabase-swift via SPM — same Supabase project/RPCs as the web client.
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.47.0

# Build settings come from xcconfig files so secrets stay out of the project.
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  FoodJournal:
    type: application
    platform: iOS
    sources:
      - path: FoodJournal
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: FoodJournal/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.waynefolkes.foodjournal
        GENERATE_INFOPLIST_FILE: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: 1  # iPhone only for v1
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        CODE_SIGN_STYLE: Automatic

  FoodJournalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FoodJournalTests
    dependencies:
      - target: FoodJournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.waynefolkes.foodjournal.tests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "5.10"

schemes:
  FoodJournal:
    build:
      targets:
        FoodJournal: all
        FoodJournalTests: [test]
    test:
      targets:
        - FoodJournalTests
