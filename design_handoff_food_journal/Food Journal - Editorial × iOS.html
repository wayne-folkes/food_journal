<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Food Journal — Editorial × iOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500;1,700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;550;600;700&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="directions/editorial-ios.jsx"></script>
<script type="text/babel" src="directions/editorial-ios-screens.jsx"></script>

<script type="text/babel">
const W = 402, H = 874;

/* Tweaks — read at render time; host can rewrite this block on disk */
const TWEAKS = /*EDITMODE-BEGIN*/{
  "accent": "#A32F22",
  "serif": "Playfair Display",
  "density": "comfortable",
  "dropCap": true
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = {
  "Editorial red":   "#A32F22",
  "Ochre":           "#B2711F",
  "Ink":             "#1C1A16",
  "Forest":          "#2E5D3C",
  "Bordeaux":        "#6E1F2B",
};

const SERIF_OPTIONS = {
  "Playfair Display":  '"Playfair Display", Georgia, serif',
  "EB Garamond":       '"EB Garamond", Georgia, serif',
  "Cormorant Garamond":'"Cormorant Garamond", Georgia, serif',
};

/* Apply tweaks by mutating the shared EI object before screens render */
function applyTweaks(t) {
  if (!window.EI) return;
  window.EI.accent = t.accent;
  window.EI.ring   = t.accent;
  window.EI.serif  = SERIF_OPTIONS[t.serif] || SERIF_OPTIONS["Playfair Display"];
}
applyTweaks(TWEAKS);

function Frame({ children, label }) {
  return (
    <div style={{ position: 'relative' }} data-screen-label={label}>
      <IOSDevice width={W} height={H}>{children}</IOSDevice>
    </div>
  );
}

/* ───────────────── Tweaks Panel ───────────────── */

function TweaksPanel({ state, onChange, onClose }) {
  const row = { padding: '10px 14px', borderTop: '0.5px solid rgba(0,0,0,0.08)' };
  const label = {
    fontFamily: '-apple-system, system-ui, sans-serif',
    fontSize: 10, letterSpacing: 1.6, textTransform: 'uppercase',
    color: 'rgba(0,0,0,0.5)', fontWeight: 600, marginBottom: 6,
  };
  const chips = (opts, active, onPick) => (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
      {opts.map(o => (
        <span key={o} onClick={() => onPick(o)} style={{
          fontFamily: '-apple-system, system-ui, sans-serif',
          fontSize: 11, fontWeight: 500,
          padding: '5px 9px', borderRadius: 999, cursor: 'pointer',
          background: active === o ? state.accent : 'rgba(0,0,0,0.04)',
          color: active === o ? '#fff' : 'rgba(0,0,0,0.75)',
          border: '0.5px solid rgba(0,0,0,0.08)',
        }}>{o}</span>
      ))}
    </div>
  );
  const swatches = (obj, active, onPick) => (
    <div style={{ display: 'flex', gap: 6 }}>
      {Object.entries(obj).map(([k, v]) => (
        <div key={k} onClick={() => onPick(v, k)} style={{
          width: 24, height: 24, borderRadius: 12, background: v,
          cursor: 'pointer',
          boxShadow: active === v
            ? `0 0 0 2px #fff, 0 0 0 3.5px ${v}`
            : 'inset 0 0 0 0.5px rgba(0,0,0,0.12)',
        }} title={k}/>
      ))}
    </div>
  );

  return (
    <div style={{
      position: 'fixed', bottom: 20, right: 20, zIndex: 50,
      width: 260, background: '#fff', borderRadius: 12,
      boxShadow: '0 2px 6px rgba(0,0,0,0.06), 0 20px 50px rgba(0,0,0,0.16)',
      overflow: 'hidden',
      fontFamily: '-apple-system, system-ui, sans-serif',
    }}>
      <div style={{
        padding: '10px 14px', display: 'flex', alignItems: 'center',
        background: '#FAF7F0',
      }}>
        <span style={{
          fontFamily: '"Playfair Display", serif', fontSize: 15,
          fontStyle: 'italic', fontWeight: 600,
        }}>Tweaks</span>
        <div style={{ flex: 1 }}/>
        <span onClick={onClose} style={{
          fontSize: 11, color: 'rgba(0,0,0,0.5)', cursor: 'pointer',
          letterSpacing: 1.4, textTransform: 'uppercase', fontWeight: 600,
        }}>Close</span>
      </div>

      <div style={row}>
        <div style={label}>Accent</div>
        {swatches(ACCENT_OPTIONS, state.accent, (v) => onChange({ accent: v }))}
      </div>

      <div style={row}>
        <div style={label}>Serif</div>
        {chips(Object.keys(SERIF_OPTIONS), state.serif, (v) => onChange({ serif: v }))}
      </div>

      <div style={row}>
        <div style={label}>Density</div>
        {chips(['comfortable', 'compact'], state.density, (v) => onChange({ density: v }))}
      </div>

      <div style={row}>
        <div style={label}>Drop cap</div>
        {chips(['on', 'off'], state.dropCap ? 'on' : 'off',
          (v) => onChange({ dropCap: v === 'on' }))}
      </div>
    </div>
  );
}

/* ───────────────── App ───────────────── */

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const handler = (ev) => {
      const d = ev.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (edits) => {
    const next = { ...tweaks, ...edits };
    setTweaks(next);
    applyTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  /* Scale factor for compose — label CSS var so children can conditionally adjust if needed. */
  const dens = tweaks.density === 'compact' ? 'compact' : 'comfortable';

  return (
    <DesignCanvas>
      <div style={{
        padding: '0 60px 40px',
        fontFamily: '-apple-system, system-ui, sans-serif',
      }}>
        <div style={{
          fontFamily: '"Playfair Display", serif',
          fontSize: 48, fontWeight: 700, letterSpacing: -1.2,
          color: 'rgba(30,20,10,0.92)', marginBottom: 4,
          fontStyle: 'italic',
        }}>Food Journal</div>
        <div style={{
          fontSize: 14, color: 'rgba(60,50,40,0.65)', maxWidth: 760,
          lineHeight: 1.55, marginBottom: 10,
        }}>
          Editorial × iOS — a food diary that looks like a pocket magazine.
          iOS ergonomics (large titles, grouped inset cards, liquid-glass compose pill),
          editorial typography (Playfair italic headlines, drop caps, small-caps kickers,
          hairline rules, tonal striped tiles). Calories sit quietly in the margins.
          Open the <b>Tweaks</b> panel (bottom-right) to try accent colors, serifs, and density.
        </div>
      </div>

      <DCSection
        title="01 · Today"
        subtitle="Home. Masthead, a quiet day-summary card, three meal cards with drop-cap ledes, an 'Up next' footer, and a floating compose pill."
      >
        <DCArtboard label="Today" width={W} height={H}>
          <Frame label="01 Today"><EditorialIOSScreen/></Frame>
        </DCArtboard>
        <DCPostIt top={80} left={W + 24} rotate={-2} width={230}>
          The home. One drop cap on the first meal card keeps rhythm — not every card needs one.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="02 · Compose"
        subtitle="Tap the compose pill. A single text field on a sheet of ruled paper — write a sentence, it extracts items. No AI chrome, no magic-wand iconography; the parsed list just appears below, ready to tap-and-tweak."
      >
        <DCArtboard label="Compose" width={W} height={H}>
          <Frame label="02 Compose"><EditorialIOSComposeScreen/></Frame>
        </DCArtboard>
        <DCPostIt top={80} left={W + 24} rotate={2} width={230}>
          Lunch chip is selected. The ruled paper is a texture cue — this is a notebook, not a form.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="03 · Meal detail"
        subtitle="Tap a meal card on Today. Editorial article layout: italic headline, horizontal tonal-tile strip instead of a photo, drop-cap lede, ingredient list with gram weights and tiny italic notes, a 'Notes' card for personal commentary."
      >
        <DCArtboard label="Meal detail" width={W} height={H}>
          <Frame label="03 Meal detail"><EditorialIOSDetailScreen/></Frame>
        </DCArtboard>
        <DCPostIt top={80} left={W + 24} rotate={-3} width={230}>
          Tonal strip at top reads as a feature image without needing photography. Each tile maps 1:1 to an ingredient.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="04 · Week"
        subtitle="Pull down from Today or tap 'Archive'. A week masthead, a tonal bar chart (stacks of colored bars = items logged), and a list of days with italic meal summaries + ingredient tile strips."
      >
        <DCArtboard label="Week" width={W} height={H}>
          <Frame label="04 Week"><EditorialIOSWeekScreen/></Frame>
        </DCArtboard>
        <DCPostIt top={80} left={W + 24} rotate={2} width={230}>
          The bar chart uses food-hue tiles instead of abstract bars — you can recognize days by their color mix.
        </DCPostIt>
      </DCSection>

      <DCSection
        title="05 · Empty state"
        subtitle="First launch. Instead of a hero illustration, use typography: an italic 'A blank page.' and three tap-to-prefill example sentences to teach the quick-capture gesture without a tutorial."
      >
        <DCArtboard label="Empty" width={W} height={H}>
          <Frame label="05 Empty"><EditorialIOSEmptyScreen/></Frame>
        </DCArtboard>
        <DCPostIt top={80} left={W + 24} rotate={-2} width={230}>
          The § ornament and the italic line do the work a Lottie would do in a generic app. Quieter, more confident.
        </DCPostIt>
      </DCSection>

      <div style={{
        padding: '40px 60px 80px', maxWidth: 900,
        fontFamily: '-apple-system, system-ui, sans-serif',
        fontSize: 14, lineHeight: 1.7, color: 'rgba(50,40,30,0.78)',
      }}>
        <div style={{
          fontFamily: '"Playfair Display", serif', fontSize: 22,
          fontWeight: 600, color: 'rgba(30,20,10,0.9)',
          marginBottom: 10, letterSpacing: -0.4, fontStyle: 'italic',
        }}>Notes & open questions</div>
        <ul style={{ paddingLeft: 18, margin: 0 }}>
          <li><b>Copy is plainer</b> now — kept 'Week 16 · Day 107' kicker and italic subtitles, dropped 'filed / forthcoming / Vol. 12'.</li>
          <li><b>Tiles instead of photos</b> throughout — each ingredient gets a hue + pattern. Consistent per-item across screens (e.g. chicken = warm orange stripe everywhere).</li>
          <li><b>Calories</b> appear only on the detail header ('~610 kcal') and Today's quiet aside. Happy to remove entirely.</li>
          <li>Open: edit flow from detail, delete confirmation, Siri / share sheet entry points, notifications.</li>
        </ul>
      </div>

      {editMode && (
        <TweaksPanel
          state={tweaks}
          onChange={update}
          onClose={() => {
            setEditMode(false);
            window.parent.postMessage({ type: '__deactivate_edit_mode' }, '*');
          }}
        />
      )}
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
